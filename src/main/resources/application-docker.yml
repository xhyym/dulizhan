# Docker 环境配置 - 通过环境变量注入

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:indie_station}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      max-lifetime: 120000          # 必须短于 MySQL wait_timeout，避免拿到已关闭的连接
      idle-timeout: 60000           # 空闲超过 1 分钟就回收
      keepalive-time: 30000         # 每 30 秒发一次心跳保活
      validation-timeout: 5000      # 连接验证超时 5 秒

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Cloudflare R2 配置
r2:
  endpoint: ${R2_ENDPOINT:}
  access-key-id: ${R2_ACCESS_KEY:}
  secret-access-key: ${R2_SECRET_KEY:}
  bucket: ${R2_BUCKET:dulizhan}
  public-url: ${R2_PUBLIC_URL:}

# 日志级别
logging:
  level:
    com.indiestation: info
    com.baomidou.mybatisplus: info
