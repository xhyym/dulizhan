server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: admin-boot
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

app:
  business-time-zone: Australia/Sydney

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.indiestation.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400           # Token 有效期 (秒) 24小时
  active-timeout: -1       # 临时有效时长 (秒) -1表示不限制
  is-concurrent: true      # 是否允许同一账号并发登录
  is-share: false          # 多端登录时是否共享 Token
  token-style: uuid        # Token 风格
  is-log: false            # 是否输出操作日志
  is-read-header: true     # 是否从 Header 读取 Token
  is-read-cookie: false    # 是否从 Cookie 读取 Token

# 日志配置
logging:
  level:
    com.indiestation: debug
    com.baomidou.mybatisplus: debug
