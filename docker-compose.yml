services:
  # ---- 后端 Java 服务 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: docker.m.daocloud.io/library/maven:3.9-eclipse-temurin-17
        JRE_IMAGE: docker.m.daocloud.io/library/eclipse-temurin:17-jre
        MAVEN_OPTS_ARGS: -Dmaven.repo.local=/root/.m2/repository
    container_name: dulizhan-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: indie_station
      DB_USERNAME: root
      DB_PASSWORD: 请改成你的数据库密码
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 请改成你的Redis密码
      R2_ENDPOINT: 请改成你的R2 Endpoint
      R2_ACCESS_KEY: 请改成你的R2 Access Key
      R2_SECRET_KEY: 请改成你的R2 Secret Key
      R2_BUCKET: dulizhan
      R2_PUBLIC_URL: 请改成你的R2 Public URL
