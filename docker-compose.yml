services:
  # ---- 后端 Java 服务（仅内网，经网关 /api 访问）----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dulizhan-backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./uploads:/app/uploads
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-indie_station}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET:-dulizhan}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}

  # ---- 前端 portal（Next.js standalone，仅内网，经网关 / 访问）----
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        # 构建期注入：浏览器可访问的网关公网地址（SSR + 浏览器同源）
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL}
    container_name: dulizhan-portal
    restart: unless-stopped
    environment:
      # 服务端渲染(容器内)直连后端内网，绕开公网 hairpin NAT 问题
      API_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend
    expose:
      - "3000"

  # ---- 统一 nginx 网关（唯一对外入口）----
  # /        → portal:3000
  # /osengroup/ → website-boot 静态文件（构建进镜像）
  # /api/    → backend:8080
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args:
        VITE_BASE_URL: /osengroup/
        VITE_API_URL: ""
    container_name: dulizhan-gateway
    restart: unless-stopped
    volumes:
      - /root/osensino.crt:/root/osensino.crt:ro
      - /root/osensino.key:/root/osensino.key:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:8080"
      - "443:443"
    environment:
      ADMIN_SECRET: ${ADMIN_SECRET}
    depends_on:
      - portal
      - backend
