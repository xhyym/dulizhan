services:
  # ---- 后端 Java 服务 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-docker.m.daocloud.io/library/maven:3.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:17-jre}
        MAVEN_OPTS_ARGS: ${MAVEN_OPTS_ARGS:--Dmaven.repo.local=/root/.m2/repository}
    container_name: dulizhan-backend
    restart: unless-stopped
    environment:
      DB_HOST: 152.136.123.201
      DB_PORT: 3306
      DB_NAME: indie_station
      DB_USERNAME: root
      DB_PASSWORD: mysql_Xdwzfi
      REDIS_HOST: 152.136.123.201
      REDIS_PORT: 6379
      REDIS_PASSWORD: bkcw123456
      # 如需 R2 存储，取消注释并填写
      # R2_ENDPOINT: https://xxx.r2.cloudflarestorage.com
      # R2_ACCESS_KEY: your_access_key
      # R2_SECRET_KEY: your_secret_key
      # R2_BUCKET: dulizhan
      # R2_PUBLIC_URL: https://xxx.r2.dev
    volumes:
      - uploads_data:/app/uploads

  # ---- 管理后台 Vue ----
  admin:
    build:
      context: ./website-boot
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_URL: ${ADMIN_API_URL:-}
        VITE_BASE_URL: ${ADMIN_BASE_URL:-/admin/}
    container_name: dulizhan-admin
    restart: unless-stopped
    depends_on:
      - backend

  # ---- 门户网站 Next.js ----
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: dulizhan-portal
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      - backend

  # ---- Nginx 反向代理 ----
  nginx:
    image: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:alpine}
    container_name: dulizhan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portal
      - backend
      - admin

volumes:
  uploads_data:
