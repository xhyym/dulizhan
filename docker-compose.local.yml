services:
  backend:
    image: dulizhan-backend:local
    build:
      context: .
      dockerfile: Dockerfile.local-backend
      args:
        RUNTIME_IMAGE: milvusdb/milvus:v2.6.8

  admin:
    image: dulizhan-admin:test
    build:
      context: ./website-boot
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: zilliz/attu:latest
        NGINX_IMAGE: nginx:1.25-alpine
        NPM_REGISTRY: https://registry.npmmirror.com
        VITE_API_URL: ""
        VITE_BASE_URL: /admin/

  portal:
    image: dulizhan-portal:test
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: zilliz/attu:latest
        NPM_REGISTRY: https://registry.npmmirror.com

  nginx:
    image: nginx:1.25-alpine
